const GREEN="#3fb950",RED="#f85149",GRAY="#7d8590";

function getChartSequence(name){
  switch(name){
    case"Hammer":return[{high:110,low:96,open:109,close:98,color:RED},{high:100,low:88,open:99,close:90,color:RED},{high:92,low:76,open:91,close:88,color:GREEN,signal:true},{high:94,low:86,open:88,close:93,color:GREEN}];
    case"Hanging Man":return[{high:92,low:82,open:83,close:91,color:GREEN},{high:100,low:90,open:91,close:99,color:GREEN},{high:101,low:85,open:100,close:97,color:RED,signal:true},{high:98,low:88,open:97,close:89,color:RED}];
    case"Inverted Hammer":return[{high:112,low:98,open:111,close:100,color:RED},{high:102,low:88,open:101,close:90,color:RED},{high:100,low:84,open:86,close:88,color:GREEN,signal:true},{high:96,low:86,open:88,close:95,color:GREEN}];
    case"Shooting Star":return[{high:94,low:84,open:85,close:93,color:GREEN},{high:102,low:91,open:93,close:101,color:GREEN},{high:116,low:99,open:101,close:103,color:RED,signal:true},{high:104,low:94,open:103,close:95,color:RED}];
    case"Dragonfly Doji":return[{high:108,low:95,open:107,close:97,color:RED},{high:99,low:85,open:98,close:87,color:RED},{high:88,low:74,open:88,close:88,color:GRAY,signal:true,doji:"dragonfly"},{high:95,low:86,open:88,close:94,color:GREEN}];
    case"Gravestone Doji":return[{high:95,low:85,open:86,close:94,color:GREEN},{high:104,low:93,open:94,close:103,color:GREEN},{high:116,low:103,open:103,close:103,color:GRAY,signal:true,doji:"gravestone"},{high:104,low:94,open:103,close:95,color:RED}];
    case"Doji":return[{high:102,low:92,open:93,close:101,color:GREEN},{high:104,low:94,open:102,close:96,color:RED},{high:106,low:92,open:99,close:99,color:GRAY,signal:true,doji:"standard"}];
    case"Spinning Top":return[{high:104,low:94,open:101,close:97,color:RED},{high:102,low:92,open:93,close:100,color:GREEN},{high:106,low:90,open:98,close:100,color:GREEN,signal:true}];
    case"Marubozu (grün)":return[{high:92,low:84,open:85,close:91,color:GREEN},{high:100,low:90,open:91,close:99,color:GREEN},{high:112,low:100,open:100,close:112,color:GREEN,signal:true,marubozu:true},{high:118,low:110,open:112,close:117,color:GREEN}];
    case"Marubozu (rot)":return[{high:116,low:106,open:115,close:107,color:RED},{high:108,low:98,open:107,close:99,color:RED},{high:100,low:88,open:100,close:88,color:RED,signal:true,marubozu:true},{high:90,low:78,open:88,close:80,color:RED}];
    default:return null;
  }
}

function ContextChart({candle}){
  if(!candle)return null;
  const seq=getChartSequence(candle.name);
  if(!seq)return null;
  const W=220,H=90,PAD_Y=8,candleW=14,gap=4;
  const startX=(W-(seq.length*candleW+(seq.length-1)*gap))/2;
  const allPrices=seq.flatMap(c=>[c.high,c.low]);
  const priceMin=Math.min(...allPrices);
  const priceRange=Math.max(...allPrices)-priceMin||1;
  const toY=p=>PAD_Y+(1-(p-priceMin)/priceRange)*(H-2*PAD_Y);
  const strokeCol=fill=>fill==="#3fb950"?"#238636":fill==="#f85149"?"#da3633":"#6b7280";
  const markt=String(candle.markt||"").toLowerCase();
  const trendLabel=markt.includes("aufwärt")?"↑ Aufwärtstrend":markt.includes("abwärt")?"↓ Abwärtstrend":"↔ Seitwärts";
  return(
    <div style={{marginTop:12}}>
      <div style={{fontSize:11,color:C.textDim,fontFamily:font.mono,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Kontext-Chart</div>
      <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 4px 4px",display:"inline-block"}}>
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
          {seq.map((c,i)=>{
            const cx=startX+i*(candleW+gap)+candleW/2,x=startX+i*(candleW+gap);
            const yHigh=toY(c.high),yLow=toY(c.low),yOpen=toY(c.open),yClose=toY(c.close);
            const yTop=Math.min(yOpen,yClose),yBot=Math.max(yOpen,yClose);
            const bodyH=Math.max(1.5,yBot-yTop);
            return(
              <g key={i}>
                {c.signal&&<rect x={x-3} y={yHigh-4} width={candleW+6} height={yLow-yHigh+8} rx={3} fill={`${C.yellow}12`} stroke={C.yellow} strokeWidth="1"/>}
                {!c.marubozu&&<line x1={cx} x2={cx} y1={yHigh} y2={yTop} stroke="#484f58" strokeWidth="1.5" strokeLinecap="round"/>}
                {!c.marubozu&&<line x1={cx} x2={cx} y1={yBot} y2={yLow} stroke="#484f58" strokeWidth="1.5" strokeLinecap="round"/>}
                {c.doji
                  ?<line x1={x+2} x2={x+candleW-2} y1={yTop} y2={yTop} stroke="#7d8590" strokeWidth="2" strokeLinecap="round"/>
                  :<rect x={x+1} y={yTop} width={candleW-2} height={bodyH} fill={c.color} stroke={strokeCol(c.color)} strokeWidth="0.5" rx="1"/>
                }
              </g>
            );
          })}
        </svg>
        <div style={{fontSize:11,color:C.textDim,fontFamily:font.mono,paddingLeft:6,paddingBottom:2}}>{trendLabel}</div>
      </div>
    </div>
  );
}

function displayName(c){const n=String(c?.name||""),d=String(c?.deName||"");return d&&d!==n?`${n} (${d})`:n;}
function isNeutralTyp(t){return String(t||"").toLowerCase().includes("neutral");}
function colorTag(t){const s=String(t||"").toLowerCase();if(s.includes("bullish"))return"tag-green";if(s.includes("bearish"))return"tag-red";return"tag-gray";}
function InfoRow({label,value,fullWidth=false}){
  if(!value)return null;
  return<div style={{display:"flex",gap:6,alignItems:"baseline",fontSize:13,lineHeight:1.6,gridColumn:fullWidth?"1 / -1":undefined}}><span style={{fontWeight:600,color:C.text,flexShrink:0,whiteSpace:"nowrap"}}>{label}:</span><span style={{color:C.textMuted}}>{value}</span></div>;
}

const QUESTION_TYPES=["name_from_description","type_from_name","market_from_name","strength_from_name","strategy_from_name"];
const ROUND_SIZE=10;
const LABELS=["A","B","C","D"];
function pick(arr,k){const a=[...arr],out=[];while(out.length<k&&a.length)out.push(a.splice(Math.floor(Math.random()*a.length),1)[0]);return out;}

function buildQuestion(){
  for(let i=0;i<50;i++){
    const qtype=pick(QUESTION_TYPES,1)[0],item=pick(candles,1)[0];
    if(qtype==="strength_from_name"&&isNeutralTyp(item.typ))continue;
    let prompt="",choices=[],correct="",renderGraphic=null;
    switch(qtype){
      case"name_from_description":prompt=`Welche Kerze passt zur Beschreibung: „${item.beschreibung}" (Signal: ${item.bedeutung})?`;correct=item.name;choices=pick(candles.map(c=>c.name),4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"type_from_name":prompt=`Welches Signal gibt ${displayName(item)}?`;correct=item.typ;choices=pick([...new Set(candles.map(c=>c.typ))],4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"market_from_name":prompt=`In welchem Trend erscheint ${displayName(item)}?`;correct=item.markt;choices=pick([...new Set(candles.map(c=>c.markt))],4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"strength_from_name":prompt=`Welche Signalstärke (1–10) hat ${displayName(item)}?`;correct=String(item.staerke);choices=pick(["3","4","5","6","7","8","9","10"],4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"strategy_from_name":prompt=`Wie würdest du ${displayName(item)} als Swing-Trader handeln?`;correct=item.strategie;choices=[correct,...pick(candles.filter(c=>c.name!==item.name).map(c=>c.strategie),3)];renderGraphic=item.svg;break;
    }
    choices=pick(choices,choices.length);
    return{qtype,item,prompt,choices,correct,renderGraphic};
  }
  const item=candles[0];
  return{qtype:"name_from_description",item,prompt:`Welche Kerze passt zur Beschreibung: „${item.beschreibung}"?`,choices:pick(candles.map(c=>c.name),4),correct:item.name,renderGraphic:item.svg};
}

function buildRoundQuestions(size){
  const out=[],typePool=[];
  while(typePool.length<size)typePool.push(...[...QUESTION_TYPES].sort(()=>Math.random()-.5));
  const typeQueue=typePool.slice(0,size),candleQueue=[];
  while(candleQueue.length<size*2)candleQueue.push(...[...candles].sort(()=>Math.random()-.5));
  let ci=0;
  for(let tries=0;out.length<size&&tries<1000;tries++){
    const qtype=typeQueue[out.length],item=candleQueue[ci%candleQueue.length];ci++;
    if(qtype==="strength_from_name"&&isNeutralTyp(item.typ))continue;
    if(out.slice(-3).map(q=>q.item?.name).includes(item.name))continue;
    let prompt="",choices=[],correct="",renderGraphic=null;
    switch(qtype){
      case"name_from_description":prompt=`Welche Kerze passt zur Beschreibung: „${item.beschreibung}" (Signal: ${item.bedeutung})?`;correct=item.name;choices=pick(candles.map(c=>c.name),4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"type_from_name":prompt=`Welches Signal gibt ${displayName(item)}?`;correct=item.typ;choices=pick([...new Set(candles.map(c=>c.typ))],4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"market_from_name":prompt=`In welchem Trend erscheint ${displayName(item)}?`;correct=item.markt;choices=pick([...new Set(candles.map(c=>c.markt))],4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"strength_from_name":prompt=`Welche Signalstärke (1–10) hat ${displayName(item)}?`;correct=String(item.staerke);choices=pick(["3","4","5","6","7","8","9","10"],4);if(!choices.includes(correct))choices[0]=correct;renderGraphic=item.svg;break;
      case"strategy_from_name":prompt=`Wie würdest du ${displayName(item)} als Swing-Trader handeln?`;correct=item.strategie;choices=[correct,...pick(candles.filter(c=>c.name!==item.name).map(c=>c.strategie),3)];renderGraphic=item.svg;break;
    }
    choices=pick(choices,choices.length);
    out.push({qtype,item,prompt,choices,correct,renderGraphic});
  }
  while(out.length<size)out.push(buildQuestion());
  return out;
}

const FEEDBACK_CORRECT=["✓ Stark! Genau erkannt.","✓ Perfekt – du kennst deine Muster.","✓ Sehr gut! Das sitzt.","✓ Richtig! Trading-Instinkt bestätigt.","✓ Exzellent – weiter so!"];
const FEEDBACK_WRONG=["✗ Knapp daneben – schau dir die Erklärung an.","✗ Nicht ganz – das Muster ist tückisch.","✗ Falsch, aber du lernst daraus.","✗ Fast – lies die Details nochmal durch.","✗ Noch nicht – Wiederholung macht den Meister."];
const randomFeedback=ok=>{const a=ok?FEEDBACK_CORRECT:FEEDBACK_WRONG;return a[Math.floor(Math.random()*a.length)];};

function FaqItem({question,answer}){
  const[open,setOpen]=useState(false);
  return(
    <div style={{borderBottom:`1px solid ${C.border}`}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"14px 0",display:"flex",justifyContent:"space-between",alignItems:"center",background:"none",border:"none",cursor:"pointer",color:C.text,fontSize:15,fontWeight:600,textAlign:"left",gap:12,boxShadow:"none"}}>
        <span>{question}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.textMuted} strokeWidth="2" style={{flexShrink:0,transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open&&<div style={{fontSize:14,color:C.textMuted,lineHeight:1.7,paddingBottom:14,paddingRight:28}}>{answer}</div>}
    </div>
  );
}

const storage={
  get:(k)=>{try{return localStorage.getItem(k);}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch{}},
  remove:(k)=>{try{localStorage.removeItem(k);}catch{}},
};

function App(){
  const[theme,setTheme]=useState(()=>storage.get("cq_theme")||"light");
  setThemeTokens(theme);
  const[mode,setMode]=useState("quiz");
  const[answer,setAnswer]=useState(null);
  const[feedbackText,setFeedbackText]=useState("");
  const[score,setScore]=useState(()=>Number(storage.get("cq_score")||0));
  const[history,setHistory]=useState(()=>{try{return JSON.parse(storage.get("cq_history")||"[]");}catch{return[];}});
  const[lastRound,setLastRound]=useState(null);
  const[reviewMode,setReviewMode]=useState(false);
  const[reviewQueue,setReviewQueue]=useState([]);
  const[reviewIndex,setReviewIndex]=useState(0);
  const[round,setRound]=useState(()=>({queue:buildRoundQuestions(ROUND_SIZE),index:0}));
  const[flash,setFlash]=useState(null);
  const[showResetConfirm,setShowResetConfirm]=useState(false);
  const[showReviewDone,setShowReviewDone]=useState(false);
  const[showCertificate,setShowCertificate]=useState(false);
  const[showFeedbackForm,setShowFeedbackForm]=useState(false);
  const[certEmail,setCertEmail]=useState("");
  const[certFirstName,setCertFirstName]=useState("");
  const[certLastName,setCertLastName]=useState("");
  const[certBirthdate,setCertBirthdate]=useState("");
  const[certPlz,setCertPlz]=useState("");
  const[certPrivacy,setCertPrivacy]=useState(false);
  const[certSent,setCertSent]=useState(false);
  const[certLevel,setCertLevel]=useState(null);
  const[roundStats,setRoundStats]=useState(()=>{try{return JSON.parse(storage.get("cq_round_stats")||'{"rounds":[],"bronzeDone":false,"silberDone":false,"goldDone":false}');}catch{return{rounds:[],bronzeDone:false,silberDone:false,goldDone:false};}});
  const flashRef=useRef(null);
  useEffect(()=>()=>{if(flashRef.current)clearTimeout(flashRef.current);},[]);
  useEffect(()=>{storage.set("cq_theme",theme);},[theme]);
  useEffect(()=>{storage.set("cq_score",String(score));},[score]);

  const inReview=reviewMode&&reviewQueue.length>0;
  const answeredCurrent=answer!==null;
  const q=inReview?reviewQueue[reviewIndex]:round.queue[round.index];
  const isNeutralNow=isNeutralTyp(q?.item?.typ);
  const currentWasCorrect=answeredCurrent?answer===q.correct:null;
  const progress=useMemo(()=>{if(inReview)return 0;const mod=history.length%ROUND_SIZE;if(history.length>0&&mod===0)return 100;return mod*(100/ROUND_SIZE);},[history.length,inReview]);
  const curNum=inReview?reviewIndex+1:round.index+1;
  const totalNum=inReview?reviewQueue.length:ROUND_SIZE;

  function next(){
    setAnswer(null);setFlash(null);setFeedbackText("");
    if(inReview){setReviewIndex(i=>(i+1)%reviewQueue.length);return;}
    setRound(prev=>{const ni=prev.index+1;return ni>=prev.queue.length?{queue:buildRoundQuestions(ROUND_SIZE),index:0}:{...prev,index:ni};});
  }

  function check(a){
    if(answer!==null)return;
    const isCorrect=a===q.correct;
    setAnswer(a);setFeedbackText(randomFeedback(isCorrect));
    if(isCorrect)setScore(s=>s+1);
    setFlash(isCorrect?"correct":"wrong");
    if(flashRef.current)clearTimeout(flashRef.current);
    flashRef.current=setTimeout(()=>setFlash(null),400);
    if(!inReview){
      setHistory(prev=>{
        const nr=prev.length+1;
        const entry={nr,question:q,given:a,isCorrect,points:isCorrect?10:0};
        const updated=[...prev,entry];
        storage.set("cq_history",JSON.stringify(updated.slice(-30)));
        if(nr%ROUND_SIZE===0){
          const roundEntries=updated.slice(nr-ROUND_SIZE,nr);
          const cc=roundEntries.filter(r=>r.isCorrect).length;
          const pct=Math.round((cc/ROUND_SIZE)*100);
          setLastRound({entries:roundEntries,correctCount:cc,percent:pct});
          setRoundStats(prev=>{
            const rs=[...prev.rounds,pct],s={...prev,rounds:rs};
            if(!prev.goldDone&&rs.filter(p=>p>=90).length>=5){s.goldDone=true;setCertLevel("gold");setShowCertificate(true);}
            else if(!prev.silberDone&&rs.filter(p=>p>=80).length>=3){s.silberDone=true;setCertLevel("silber");setShowCertificate(true);}
            else if(!prev.bronzeDone&&rs.filter(p=>p>=70).length>=1){s.bronzeDone=true;setCertLevel("bronze");setShowCertificate(true);}
            storage.set("cq_round_stats",JSON.stringify(s));return s;
          });
        }
        return updated;
      });
    }
  }

  function startReviewWrong(){
    if(!lastRound)return;
    const wrong=lastRound.entries.filter(e=>!e.isCorrect);
    if(!wrong.length)return;
    setReviewQueue(wrong.map(e=>e.question));
    setReviewIndex(0);setReviewMode(true);setAnswer(null);setFlash(null);
  }

  function stopReview(){
    setReviewMode(false);setReviewQueue([]);setReviewIndex(0);
    setRound({queue:buildRoundQuestions(ROUND_SIZE),index:0});
    setAnswer(null);setFlash(null);setFeedbackText("");setShowReviewDone(true);
  }

  function resetAll(){
    setScore(0);setHistory([]);setLastRound(null);
    setReviewMode(false);setReviewQueue([]);setReviewIndex(0);
    setRound({queue:buildRoundQuestions(ROUND_SIZE),index:0});
    setAnswer(null);setFlash(null);setFeedbackText("");
    storage.remove("cq_score");storage.remove("cq_history");storage.remove("cq_round_stats");
    setRoundStats({rounds:[],bronzeDone:false,silberDone:false,goldDone:false});setCertLevel(null);
  }

  const inputStyle={padding:"10px 14px",borderRadius:6,fontSize:13,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,outline:"none",width:"100%"};

  return(
    <>
      <GlobalStyle theme={theme}/>
      <div className="app-padding" style={{minHeight:"100vh",background:C.bg,color:C.text,padding:"20px 20px 48px",fontFamily:font.sans}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"grid",gap:16}}>

          {/* Header */}
          <header style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap",paddingBottom:16,borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {[...Array(3)].map((_,i)=>(
                  <div key={i} style={{display:"flex",gap:3}}>
                    {[...Array(3)].map((_,j)=>(
                      <div key={j} style={{width:3,height:i===1?10:i===0?6:14,background:i===2&&j===1?C.red:i===0&&j===1?C.green:C.border,borderRadius:1}}/>
                    ))}
                  </div>
                ))}
              </div>
              <div>
                <div style={{fontSize:15,fontWeight:600,letterSpacing:"-0.01em",lineHeight:1}}>Candlestick Quiz</div>
                <div style={{fontSize:11,color:C.textMuted,fontFamily:font.mono,marginTop:3}}>Swing-Trading · {candles.length} Muster</div>
              </div>
            </div>
            <div className="header-nav" style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <div className="score-badge">Punkte <span>{score}</span></div>
              <div style={{width:1,height:24,background:C.border}}/>
              <button className="nav-btn" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{fontSize:15,padding:"5px 10px"}}>
                {theme==="dark"
                  ?<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
                  :<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                }
              </button>
              <div style={{width:1,height:24,background:C.border}}/>
              <button className={`nav-btn${mode==="quiz"?" active":""}`} onClick={()=>setMode("quiz")}>Quiz</button>
              <button className={`nav-btn${mode==="lernen"?" active":""}`} onClick={()=>setMode("lernen")}>Lernen</button>

          {/* ── Lernen Tab ── */}

                <div style={{fontSize:11,color:C.blue,fontFamily:font.mono,textTransform:"uppercase",letterSpacing:"0.08em"}}>Einstieg · Absolute Anfänger</div>
                <h2 style={{fontSize:20,fontWeight:600,color:C.text,lineHeight:1.3}}>Kerzencharts lesen lernen – das Fundament des Tradings</h2>

                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>

                  <span style={{background:C.blueBg,color:C.blue,borderRadius:6,padding:"2px 10px",fontSize:12,fontFamily:font.mono,border:`1px solid ${C.blueBdr}`}}>01</span>

                </div>
                <p style={{fontSize:14,lineHeight:1.8,color:C.textMuted,marginBottom:16}}>

                </p>

                    <div style={{fontSize:12,fontWeight:600,color:C.green}}>Grüne Kerze</div>
                    <svg width="80" height="160" viewBox="0 0 80 160">
                      {/* Docht oben */}
                      <line x1="40" x2="40" y1="10" y2="40" stroke="#484f58" strokeWidth="2"/>
                      {/* Körper */}
                      <rect x="20" y="40" width="40" height="80" fill="#3fb950" stroke="#238636" strokeWidth="1" rx="2"/>
                      {/* Docht unten */}

                      <text x="68" y="124" fontSize="9" fill="#3fb950" fontFamily="monospace">Eröffnung</text>
                      <text x="68" y="150" fontSize="9" fill="#7d8590" fontFamily="monospace">Tief</text>
                      <line x1="64" x2="66" y1="13" y2="13" stroke="#7d8590" strokeWidth="1"/>
                      <line x1="64" x2="66" y1="43" y2="43" stroke="#3fb950" strokeWidth="1"/>
                      <line x1="64" x2="66" y1="120" y2="120" stroke="#3fb950" strokeWidth="1"/>
                      <line x1="64" x2="66" y1="148" y2="148" stroke="#7d8590" strokeWidth="1"/>
                    </svg>
                    <div style={{fontSize:11,color:C.green,fontFamily:font.mono,textAlign:"center"}}>Schluss &gt; Eröffnung<br/>Käufer gewinnen ↑</div>
                  </div>
                  {/* Rote Kerze */}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.red}}>Rote Kerze</div>
                    <svg width="80" height="160" viewBox="0 0 80 160">
                      <line x1="40" x2="40" y1="10" y2="40" stroke="#484f58" strokeWidth="2"/>
                      <rect x="20" y="40" width="40" height="80" fill="#f85149" stroke="#da3633" strokeWidth="1" rx="2"/>
                      <line x1="40" x2="40" y1="120" y2="148" stroke="#484f58" strokeWidth="2"/>
                      <text x="68" y="14" fontSize="9" fill="#7d8590" fontFamily="monospace">Hoch</text>
                      <text x="68" y="44" fontSize="9" fill="#f85149" fontFamily="monospace">Eröffnung</text>
                      <text x="68" y="124" fontSize="9" fill="#f85149" fontFamily="monospace">Schluss</text>
                      <text x="68" y="150" fontSize="9" fill="#7d8590" fontFamily="monospace">Tief</text>

                      <line x1="64" x2="66" y1="43" y2="43" stroke="#f85149" strokeWidth="1"/>
                      <line x1="64" x2="66" y1="120" y2="120" stroke="#f85149" strokeWidth="1"/>
                      <line x1="64" x2="66" y1="148" y2="148" stroke="#7d8590" strokeWidth="1"/>
                    </svg>
                    <div style={{fontSize:11,color:C.red,fontFamily:font.mono,textAlign:"center"}}>Schluss &lt; Eröffnung<br/>Verkäufer gewinnen ↓</div>

                  <div style={{flex:1,minWidth:200,display:"grid",gap:8}}>

                            <rect x="9" y="14" width="18" height="24" fill="#3fb950" stroke="#238636" strokeWidth="0.5" rx="1.5" opacity="0.25"/>

                            {/* Pfeil */}

                        )
                      },
                      {
                        titel:"Oberer Docht",
                        erkl:"Vom Körper bis zum Hoch. Zeigt: Käufer haben den Kurs hochgetrieben, Verkäufer haben ihn zurückgedrückt.",
                        akzent:"#f85149",
                        svg:(
                          <svg width="36" height="60" viewBox="0 0 36 60">
                            <line x1="18" x2="18" y1="4" y2="14" stroke="#f85149" strokeWidth="2.5" strokeLinecap="round"/>
                            <rect x="9" y="14" width="18" height="24" fill="#3fb950" stroke="#238636" strokeWidth="0.5" rx="1.5" opacity="0.25"/>

                      },
                      {

                          <svg width="36" height="60" viewBox="0 0 36 60">
                            <line x1="18" x2="18" y1="4" y2="14" stroke="#484f58" strokeWidth="1.5" opacity="0.3"/>
                            <line x1="18" x2="18" y1="38" y2="52" stroke="#484f58" strokeWidth="1.5" opacity="0.3"/>

                            <rect x="9" y="14" width="18" height="24" fill="#3fb950" stroke="#238636" strokeWidth="0.5" rx="1.5"/>
                            {/* Highlight Rahmen */}

                          </svg>
                        )
                      },
                      {
                        titel:"Unterer Docht",
                        erkl:"Vom Körper bis zum Tief. Zeigt: Verkäufer haben den Kurs gedrückt, Käufer haben ihn zurückgekauft.",

                          <svg width="36" height="60" viewBox="0 0 36 60">
                            <line x1="18" x2="18" y1="4" y2="14" stroke="#484f58" strokeWidth="1.5" opacity="0.3"/>
                            <rect x="9" y="14" width="18" height="24" fill="#3fb950" stroke="#238636" strokeWidth="0.5" rx="1.5" opacity="0.25"/>
                            <line x1="18" x2="18" y1="38" y2="52" stroke="#e3b341" strokeWidth="2.5" strokeLinecap="round"/>
                            {/* Highlight Box */}
                            <rect x="14" y="36" width="8" height="18" rx="2" fill="none" stroke="#e3b341" strokeWidth="1.5" strokeDasharray="3,2"/>
                          </svg>
                        )
                      },
                      {
                        titel:"Tief",
                        erkl:"Der tiefste Kurs im Zeitraum – die Spitze des unteren Dochts.",
                        akzent:"#7d8590",
                        svg:(
                          <svg width="36" height="60" viewBox="0 0 36 60">
                            <line x1="18" x2="18" y1="4" y2="14" stroke="#484f58" strokeWidth="1.5" opacity="0.3"/>
                            <rect x="9" y="14" width="18" height="24" fill="#3fb950" stroke="#238636" strokeWidth="0.5" rx="1.5" opacity="0.25"/>
                            <line x1="18" x2="18" y1="38" y2="52" stroke="#484f58" strokeWidth="1.5" opacity="0.3"/>
                            <circle cx="18" cy="52" r="3" fill="#7d8590"/>
                          </svg>
                        )
                      },
                    ].map(({titel,erkl,akzent,svg})=>(
                      <div key={titel} style={{padding:"10px 12px",borderRadius:6,background:C.surfaceHi,border:`1px solid ${C.border}`,display:"flex",gap:12,alignItems:"center"}}>
                        <div style={{flexShrink:0,background:C.bg,borderRadius:6,padding:"4px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",width:48,height:68}}>
                          {svg}
                        </div>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:akzent,marginBottom:2}}>{titel}</div>
                          <div style={{fontSize:12,color:C.textMuted,lineHeight:1.5}}>{erkl}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{padding:"10px 14px",borderRadius:6,background:C.yellowBg,border:`1px solid ${C.yellowBdr}`,fontSize:13,color:C.yellow}}>
                  💡 <strong>Merksatz:</strong> Grüne Kerze = Käufer haben gewonnen. Rote Kerze = Verkäufer haben gewonnen. So einfach ist der erste Schritt.
                </div>
              </div>

              {/* Warum Kerzenanalyse */}
              <div style={{padding:"20px",borderRadius:10,background:C.surface,border:`1.5px solid ${C.border}`}}>
                <div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{background:C.blueBg,color:C.blue,borderRadius:6,padding:"2px 10px",fontSize:12,fontFamily:font.mono,border:`1px solid ${C.blueBdr}`}}>02</span>
                  Warum nutzen Trader Kerzenanalyse?
                </div>
                <p style={{fontSize:14,lineHeight:1.8,color:C.textMuted,marginBottom:14}}>

                <div style={{display:"grid",gap:10,marginBottom:14}}>
                  {[
                    {emoji:"😰",titel:"Panik der Verkäufer",text:"Lange untere Dochte zeigen: Kurs wurde abverkauft, aber Käufer haben zurückgeschlagen – mögliche Bodenbildung."},
                    {emoji:"🤑",titel:"Erschöpfung der Käufer",text:"Lange obere Dochte zeigen: Kurs wurde hochgekauft, aber Verkäufer haben zurückgedrückt – mögliche Topbildung."},
                    {emoji:"⚖️",titel:"Gleichgewicht",text:"Kleine Körper (Doji, Spinning Top) zeigen: Käufer und Verkäufer sind gleich stark – Unentschlossenheit, oft vor einer großen Bewegung."},
                    {emoji:"💪",titel:"Dominanz",text:"Große Körper ohne Dochte (Marubozu) zeigen: Eine Seite dominiert komplett – starkes Momentum."},

                    <div key={titel} style={{padding:"12px 14px",borderRadius:8,background:C.surfaceHi,border:`1px solid ${C.border}`,display:"flex",gap:12,alignItems:"flex-start"}}>

                        <div style={{fontSize:13,color:C.textMuted,lineHeight:1.6}}>{text}</div>
                      </div>
                    </div>

                </div>
              </div>

                  <span style={{background:C.blueBg,color:C.blue,borderRadius:6,padding:"2px 10px",fontSize:12,fontFamily:font.mono,border:`1px solid ${C.blueBdr}`}}>03</span>
                  Glossar – die wichtigsten Begriffe
                </div>

                    {begriff:"Bearish 🔴",erkl:"Fallende Erwartung – Verkäufer sind aktiv. Kommt vom Bären der nach unten schlägt."},
                    {begriff:"Trend",erkl:"Die allgemeine Richtung des Marktes: Aufwärtstrend (Kurs steigt), Abwärtstrend (Kurs fällt), Seitwärtstrend (kein klares Bild)."},
                    {begriff:"Aufwärtstrend",erkl:"Jedes neue Hoch ist höher als das vorherige. Jedes neue Tief ist ebenfalls höher als das vorherige. Käufer haben die Kontrolle."},
                    {begriff:"Abwärtstrend",erkl:"Jedes neue Hoch ist tiefer als das vorherige. Jedes neue Tief ist ebenfalls tiefer. Verkäufer haben die Kontrolle."},
                    {begriff:"Support (Unterstützung)",erkl:"Eine Kurszone wo Käufer wiederholt einsteigen und den Kurs stützen. Der Kurs prallt hier oft nach oben ab."},
                    {begriff:"Widerstand",erkl:"Eine Kurszone wo Verkäufer wiederholt aktiv werden. Der Kurs dreht hier oft nach unten."},
                    {begriff:"Reversal (Umkehr)",erkl:"Der Trend wechselt die Richtung – z.B. von Abwärtstrend zu Aufwärtstrend."},

                      <div style={{fontSize:13,color:C.textMuted,lineHeight:1.6}}>{erkl}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Muster-Überblick */}
              <div style={{padding:"20px",borderRadius:10,background:C.surface,border:`1.5px solid ${C.border}`}}>
                <div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{background:C.blueBg,color:C.blue,borderRadius:6,padding:"2px 10px",fontSize:12,fontFamily:font.mono,border:`1px solid ${C.blueBdr}`}}>04</span>

                </div>

                  Es gibt <strong style={{color:C.text}}>vier Grundtypen</strong> von Kerzenmustern – du lernst sie alle in diesem Quiz:

          {/* Flashcards */}

                      <InfoRow label="Strategie" value={c.strategie}/>
                    </div>
                    <ContextChart candle={c}/>
                    {c.erklaerung&&(
                      <div className="info-box" style={{marginTop:10,padding:"8px 12px",borderRadius:6,lineHeight:1.5}}>
                        <span style={{color:C.textMuted,fontWeight:600}}>Erklärung: </span>{c.erklaerung}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}

          {/* Review Done */}
          {showReviewDone&&mode==="quiz"&&(
            <div className="card" style={{border:`1px solid ${C.greenBdr}`,background:C.greenBg}}>
              <div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"flex-start"}}>
                <div style={{fontSize:20}}>🏆</div>
                <div style={{fontWeight:600,fontSize:15,color:C.green}}>Stark – du hast deine Fehler verbessert!</div>
                <p style={{fontSize:15,color:C.textMuted,lineHeight:1.6}}>Möchtest du den Test erneut machen und dir die Chance auf ein <strong style={{color:C.text}}>Zertifikat</strong> sichern?</p>
                <button className="nav-btn primary" onClick={()=>{setShowReviewDone(false);resetAll();}}>Test neu starten →</button>
              </div>
            </div>
          )}

          {/* Rundenübersicht */}
          {lastRound&&mode==="quiz"&&(
            <div className="card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontWeight:600,fontSize:15}}>Rundenübersicht</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{lastRound.correctCount}/{ROUND_SIZE} richtig · {lastRound.percent}%</div>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{fontFamily:font.mono,fontSize:20,fontWeight:600,color:lastRound.percent>=70?C.green:lastRound.percent>=40?C.yellow:C.red}}>{lastRound.percent}%</div>
                  <button className="nav-btn" style={{opacity:lastRound.entries.filter(e=>!e.isCorrect).length===0?0.4:1}} disabled={lastRound.entries.filter(e=>!e.isCorrect).length===0} onClick={startReviewWrong}>Falsche wiederholen</button>
                </div>
              </div>
              <div style={{overflowX:"auto"}}>
                <table>
                  <thead><tr><th>#</th><th>Kerze</th><th>Frage (kurz)</th><th>Ergebnis</th><th>Punkte</th></tr></thead>
                  <tbody>
                    {lastRound.entries.map((e,idx)=>{
                      const prompt=e.question?.prompt||"";
                      return(
                        <tr key={e.nr}>
                          <td style={{color:C.textMuted,fontFamily:font.mono,fontSize:11}}>{idx+1}</td>
                          <td style={{fontWeight:400,fontSize:13}}>{e.question?.item?displayName(e.question.item):""}</td>
                          <td style={{color:C.textMuted,fontSize:11}}>{prompt.length>55?prompt.slice(0,52)+"…":prompt}</td>
                          <td style={{color:e.isCorrect?C.green:C.red,fontFamily:font.mono,fontSize:13}}>{e.isCorrect?"✓":"✗"}</td>
                          <td style={{fontFamily:font.mono,fontSize:11,color:e.isCorrect?C.green:C.textMuted}}>{e.points}</td>
                        </tr>
                      );
                    })}
                    <tr style={{fontWeight:600}}>
                      <td colSpan={3} style={{color:C.textMuted,paddingTop:12}}>Gesamt</td>
                      <td style={{paddingTop:12,color:lastRound.percent>=70?C.green:lastRound.percent>=40?C.yellow:C.red}}>{lastRound.correctCount}/{ROUND_SIZE}</td>
                      <td style={{paddingTop:12,fontFamily:font.mono}}>{lastRound.percent}%</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* SEO */}
          <section style={{display:"grid",gap:18,background:C.surfaceHi,borderRadius:10,padding:20,border:`1px solid ${C.border}`}}>
            <div>
              <div style={{fontSize:20,fontWeight:600,marginBottom:10}}>Was sind Candlestick Muster?</div>
              <p style={{fontSize:15,lineHeight:1.8,color:C.textMuted}}>Candlestick Muster, auch <strong style={{color:C.text}}>Kerzenmuster</strong> genannt, sind ein zentrales Werkzeug der technischen Analyse. Sie helfen Tradern dabei, das Verhalten von Käufern und Verkäufern im Chart besser zu verstehen und mögliche Trendwechsel frühzeitig zu erkennen.</p>
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>Warum ist ein Candlestick Quiz sinnvoll?</div>
              <p style={{fontSize:15,lineHeight:1.8,color:C.textMuted}}>Viele Trader kennen Begriffe wie <strong style={{color:C.text}}>Hammer</strong>, <strong style={{color:C.text}}>Doji</strong> oder <strong style={{color:C.text}}>Shooting Star</strong>, tun sich aber schwer, diese Muster im echten Chart schnell zu erkennen. Ein interaktives Quiz hilft dir dabei, Kerzenmuster nicht nur theoretisch zu lernen, sondern sie visuell zu trainieren.</p>
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>Für wen ist dieses Trading Quiz geeignet?</div>
              <p style={{fontSize:15,lineHeight:1.8,color:C.textMuted}}>Dieses Quiz eignet sich für Anfänger die Trading von Grund auf lernen möchten, ebenso wie für fortgeschrittene Trader die ihr Wissen auffrischen wollen. Besonders im <strong style={{color:C.text}}>Swing Trading</strong> ist das Verständnis von Kerzenmustern ein wertvoller Baustein.</p>
            </div>
          </section>

          {/* Bewertung + FAQ */}
          <div style={{background:C.surfaceHi,borderRadius:10,padding:"16px",border:`1px solid ${C.border}`,display:"grid",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:8,background:C.surfaceHi,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(i=><svg key={i} width="18" height="18" viewBox="0 0 24 24" fill="#e3b341" stroke="#e3b341" strokeWidth="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>)}</div>
              <div><span style={{fontSize:15,fontWeight:600,color:C.text}}>4.9 / 5</span><span style={{fontSize:13,color:C.textMuted,marginLeft:8}}>Nutzerfeedback · Kostenlos</span></div>
            </div>
            <section style={{display:"grid",gap:0}}>
              <div style={{fontSize:20,fontWeight:600,marginBottom:16}}>Häufige Fragen zu Candlestick Mustern und Patterns</div>
              {[{q:"Was sind Candlestick Muster?",a:"Candlestick Muster (auch Kerzenmuster genannt) sind grafische Darstellungen von Kursbewegungen in einem bestimmten Zeitraum. Bekannte Patterns wie Hammer, Doji oder Shooting Star helfen Tradern dabei, mögliche Trendwechsel frühzeitig zu erkennen."},{q:"Ist das Candlestick Quiz kostenlos?",a:"Ja, das Candlestick Quiz ist vollständig kostenlos und ohne Anmeldung nutzbar – auf Desktop und Mobilgeräten."},{q:"Gibt es ein Zertifikat?",a:"Ja! Bronze (70%+ in 1 Runde), Silber (80%+ in 3 Runden), Gold (90%+ in 5 Runden) – kostenlos per E-Mail."},{q:"Wie viele Candlestick Muster sind enthalten?",a:"10 Muster: Hammer, Inverted Hammer, Hanging Man, Shooting Star, Dragonfly Doji, Gravestone Doji, Marubozu grün/rot, Doji und Spinning Top."},{q:"Unterschied Hammer und Hanging Man?",a:"Beide sehen identisch aus. Hammer nach Abwärtstrend bullisch, Hanging Man nach Aufwärtstrend bärisch."},{q:"Wie wird ein Candlestick Pattern bestätigt?",a:"Durch die Folgekerze die die Richtung bestätigt. RSI und Volumen helfen zusätzlich."}].map(({q,a},i)=><FaqItem key={i} question={q} answer={a}/>)}
            </section>
          </div>

          {/* Fehler melden */}
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <button className="nav-btn" onClick={()=>setShowFeedbackForm(v=>!v)} style={{fontSize:11}}>⚑ Fehler melden</button>
          </div>
          {showFeedbackForm&&(
            <div className="card" style={{border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:600,fontSize:15,marginBottom:12}}>Fehler melden</div>
              <p style={{fontSize:13,color:C.textMuted,marginBottom:14,lineHeight:1.6}}>Hast du einen Fehler entdeckt? Schreib mir kurz – ich freue mich über jedes Feedback.</p>
              <a href="mailto:gaucho0@web.de?subject=Fehler%20im%20Candlestick%20Quiz" style={{display:"inline-block",padding:"9px 18px",borderRadius:6,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:13,fontWeight:600,textDecoration:"none"}}>✉ E-Mail schreiben</a>
            </div>
          )}

          {/* Footer */}
          <footer style={{fontSize:11,color:C.textDim,fontFamily:font.mono,lineHeight:1.8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
            Legende: Signalstärke 1–10 · Neutral = Richtung erst durch Folgekerze · Wirkungsdauer in Tagen
          </footer>
        </div>

        {/* Impressum */}
        <hr style={{marginTop:"40px",opacity:0.2}}/>
        <div style={{fontSize:"11px",opacity:0.7,padding:"20px"}}>
          <h3>Impressum</h3>
          <p>Angaben gemäß § 5 TMG:<br/>Ludolf Schnittger<br/>Mexikoring 15<br/>22297 Hamburg</p>
          <p>Kontakt: gaucho0@web.de</p>
          <p>© {new Date().getFullYear()} Candlestick Quiz – Kerzenmuster lernen</p>
        </div>

        {/* Reset Confirm */}
        {showResetConfirm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
            <div style={{background:C.surface,border:`1px solid ${C.redBdr}`,borderRadius:12,padding:24,maxWidth:360,width:"100%",display:"grid",gap:14}}>
              <div style={{fontSize:15,fontWeight:600}}>Alles zurücksetzen?</div>
              <p style={{fontSize:15,color:C.textMuted,lineHeight:1.6}}>Dein Punktestand und deine Lernhistorie werden gelöscht.</p>
              <div style={{display:"flex",gap:10}}>
                <button className="nav-btn danger" style={{flex:1}} onClick={()=>{resetAll();setShowResetConfirm(false);}}>Ja, alles löschen</button>
                <button className="nav-btn" style={{flex:1}} onClick={()=>setShowResetConfirm(false)}>Abbrechen</button>
              </div>
            </div>
          </div>
        )}

        {/* Zertifikat Popup */}
        {showCertificate&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
            <div className="cert-popup" style={{background:C.surface,border:`1px solid ${C.greenBdr}`,borderRadius:14,padding:28,maxWidth:440,width:"100%",display:"grid",gap:16,maxHeight:"90vh",overflowY:"auto"}}>
              {!certSent?(
                <>
                  <div style={{fontSize:32,textAlign:"center"}}>🏆</div>
                  <div style={{fontSize:20,fontWeight:600,textAlign:"center",color:C.green}}>Glückwunsch – Zertifikat erreicht!</div>
                  <p style={{fontSize:15,color:C.textMuted,lineHeight:1.6,textAlign:"center"}}>Füll das Formular aus und ich schicke dir dein persönliches <strong style={{color:C.text}}>Zertifikat</strong> zu.</p>
                  {[{label:"Vorname",value:certFirstName,set:setCertFirstName,placeholder:"z. B. Max"},{label:"Nachname",value:certLastName,set:setCertLastName,placeholder:"z. B. Mustermann"},{label:"E-Mail",value:certEmail,set:setCertEmail,placeholder:"deine@email.de",type:"email"}].map(({label,value,set,placeholder,type})=>(
                    <div key={label} style={{display:"grid",gap:5}}>
                      <label style={{fontSize:11,color:C.textMuted,fontWeight:600}}>{label} <span style={{color:C.red}}>*</span></label>
                      <input type={type||"text"} placeholder={placeholder} value={value} onChange={e=>set(e.target.value)} style={inputStyle}/>
                    </div>
                  ))}
                  <label style={{display:"flex",alignItems:"flex-start",gap:10,fontSize:11,color:C.textMuted,cursor:"pointer"}}>
                    <input type="checkbox" checked={certPrivacy} onChange={e=>setCertPrivacy(e.target.checked)} style={{marginTop:2,flexShrink:0}}/>
                    Ich stimme zu, dass meine Daten zum Versand des Zertifikats verwendet werden.
                  </label>
                  <div style={{display:"flex",gap:10}}>
                    <button className="nav-btn primary" style={{flex:1,opacity:(!certFirstName||!certLastName||!certEmail||!certPrivacy)?0.4:1}}
                      disabled={!certFirstName||!certLastName||!certEmail||!certPrivacy}
                      onClick={()=>{
                        const heute=new Date().toLocaleDateString("de-DE");
                        const body=`Hallo,\n\nich habe das Zertifikat im Candlestick Quiz erreicht!\n\nName: ${certFirstName} ${certLastName}\nE-Mail: ${certEmail}\nDatum: ${heute}`;
                        window.location.href=`mailto:gaucho0@web.de?subject=${encodeURIComponent("Zertifikat Anfrage – Candlestick Quiz")}&body=${encodeURIComponent(body)}`;
                        setCertSent(true);
                      }}>
                      Zertifikat anfordern →
                    </button>
                    <button className="nav-btn" onClick={()=>setShowCertificate(false)}>Schließen</button>
                  </div>
                </>
              ):(
                <>
                  <div style={{fontSize:32,textAlign:"center"}}>✉️</div>
                  <div style={{fontSize:15,fontWeight:600,textAlign:"center",color:C.green}}>E-Mail-Programm öffnet sich!</div>
                  <p style={{fontSize:15,color:C.textMuted,lineHeight:1.6,textAlign:"center"}}>Bitte auf <strong style={{color:C.text}}>Senden</strong> klicken.</p>
                  <button className="nav-btn primary" onClick={()=>{setShowCertificate(false);setCertSent(false);setCertEmail("");setCertFirstName("");setCertLastName("");setCertPrivacy(false);}}>Schließen</button>
                </>
              )}
            </div>
          </div>
        )}
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
